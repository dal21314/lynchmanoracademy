# Lynch Manor Academy — Netlify configuration
# This file lives at the root of the deployed folder.

[build]
  publish = "."

# Password-gate the Student Portal with an edge function.
# Reads STUDENT_PORTAL_PASSWORD from the site's environment variables.
[[edge_functions]]
  function = "student-portal-auth"
  path = "/students"

[[edge_functions]]
  function = "student-portal-auth"
  path = "/students/*"
